<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindFlow — Hub Interno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #2E4FFF;
      --teal: #00B5A0;
      --blue2: #7B9AFF;
      --bg: #04060E;
      --muted: #8E8FA2;
      --motion-open-dur: 480ms;
      --motion-close-dur: 380ms;
      --motion-open-ease: cubic-bezier(0.32, 0.72, 0, 1);
      --motion-close-ease: cubic-bezier(0.4, 0, 0.2, 1);
    }

    @property --ba {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    #neural-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── V13 logo keyframes ── */
    @keyframes v13-trace-fwd {

      0%,
      1.9% {
        stroke-dashoffset: 1000;
        stroke-opacity: 0;
      }

      2% {
        stroke-dashoffset: 1000;
        stroke-opacity: 1;
      }

      25% {
        stroke-dashoffset: 500;
        stroke-opacity: 1;
      }

      29% {
        stroke-dashoffset: 500;
        stroke-opacity: 0.4;
      }

      33%,
      100% {
        stroke-dashoffset: 500;
        stroke-opacity: 0;
      }
    }

    @keyframes v13-glow-fwd {

      0%,
      1.9% {
        stroke-dashoffset: 1000;
        stroke-opacity: 0;
      }

      2% {
        stroke-dashoffset: 1000;
        stroke-opacity: 0.8;
      }

      25% {
        stroke-dashoffset: 500;
        stroke-opacity: 0.8;
      }

      28%,
      100% {
        stroke-dashoffset: 500;
        stroke-opacity: 0;
      }
    }

    @keyframes v13-trace-rev {

      0%,
      1.9% {
        stroke-dasharray: 0 1000 0;
        stroke-opacity: 0;
      }

      2% {
        stroke-dasharray: 0 1000 0;
        stroke-opacity: 1;
      }

      25% {
        stroke-dasharray: 0 500 500;
        stroke-opacity: 1;
      }

      29% {
        stroke-dasharray: 0 500 500;
        stroke-opacity: 0.4;
      }

      33%,
      100% {
        stroke-dasharray: 0 500 500;
        stroke-opacity: 0;
      }
    }

    @keyframes v13-glow-rev {

      0%,
      1.9% {
        stroke-dasharray: 0 1000 0;
        stroke-opacity: 0;
      }

      2% {
        stroke-dasharray: 0 1000 0;
        stroke-opacity: 0.8;
      }

      25% {
        stroke-dasharray: 0 500 500;
        stroke-opacity: 0.8;
      }

      28%,
      100% {
        stroke-dasharray: 0 500 500;
        stroke-opacity: 0;
      }
    }

    @keyframes v13-charge {

      0%,
      2% {
        opacity: 0;
      }

      25% {
        opacity: 0.07;
      }

      26%,
      100% {
        opacity: 0;
      }
    }

    @keyframes v13-flash {

      0%,
      24% {
        opacity: 0;
        filter: none;
      }

      25.5% {
        opacity: 1;
        filter: brightness(5) blur(5px);
      }

      26.9% {
        opacity: 0.1;
        filter: brightness(1) blur(1px);
      }

      28.4% {
        opacity: 0.75;
        filter: brightness(4) blur(4px);
      }

      29.8% {
        opacity: 0.06;
        filter: brightness(1) blur(0);
      }

      31.3% {
        opacity: 0.45;
        filter: brightness(3) blur(3px);
      }

      33%,
      100% {
        opacity: 0;
        filter: none;
      }
    }

    @keyframes v13-flash-bloom {

      0%,
      24% {
        opacity: 0;
      }

      26% {
        opacity: 0.7;
      }

      32% {
        opacity: 0.35;
      }

      35%,
      100% {
        opacity: 0;
      }
    }

    @keyframes v13-fill {

      0%,
      25% {
        opacity: 0;
        filter: brightness(1);
      }

      30% {
        opacity: 1;
        filter: brightness(2.8);
      }

      33% {
        opacity: 1;
        filter: brightness(1);
      }

      70% {
        opacity: 1;
        filter: brightness(1);
      }

      84% {
        opacity: 0;
        filter: brightness(1);
      }

      100% {
        opacity: 0;
      }
    }

    @keyframes v13-aura {

      0%,
      2% {
        opacity: 0;
      }

      25% {
        opacity: 0.04;
      }

      26% {
        opacity: 0.75;
      }

      30% {
        opacity: 0.22;
      }

      37.5% {
        opacity: 0.28;
      }

      43.75% {
        opacity: 0.16;
      }

      50% {
        opacity: 0.26;
      }

      70% {
        opacity: 0.18;
      }

      84%,
      100% {
        opacity: 0;
      }
    }

    @keyframes v13-mid {

      0%,
      2% {
        opacity: 0;
      }

      25% {
        opacity: 0.06;
      }

      26% {
        opacity: 0.9;
      }

      30% {
        opacity: 0.4;
      }

      50% {
        opacity: 0.47;
      }

      70% {
        opacity: 0.32;
      }

      84%,
      100% {
        opacity: 0;
      }
    }

    @keyframes v13-edge {

      0%,
      2% {
        opacity: 0;
      }

      25% {
        opacity: 0.09;
      }

      26% {
        opacity: 1.0;
      }

      30% {
        opacity: 0.55;
      }

      50% {
        opacity: 0.62;
      }

      70% {
        opacity: 0.45;
      }

      84%,
      100% {
        opacity: 0;
      }
    }

    @keyframes v13-exit {

      0%,
      75% {
        opacity: 0;
      }

      77.5% {
        opacity: 0.3;
      }

      84%,
      100% {
        opacity: 0;
      }
    }

    .v13-trace-fwd {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: v13-trace-fwd 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .v13-glow-fwd {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: v13-glow-fwd 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .v13-trace-rev {
      stroke-dashoffset: 0;
      stroke-dasharray: 0 1000 0;
      animation: v13-trace-rev 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .v13-glow-rev {
      stroke-dashoffset: 0;
      stroke-dasharray: 0 1000 0;
      animation: v13-glow-rev 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .v13-charge {
      animation: v13-charge 8s ease-in-out infinite;
    }

    .v13-flash {
      animation: v13-flash 8s ease-in-out infinite;
    }

    .v13-flash-bloom {
      filter: blur(30px) brightness(3);
      animation: v13-flash-bloom 8s ease-in-out infinite;
    }

    .v13-fill {
      animation: v13-fill 8s ease-in-out infinite;
    }

    .v13-aura {
      filter: blur(22px);
      animation: v13-aura 8s ease-in-out infinite;
    }

    .v13-mid {
      filter: blur(7px);
      animation: v13-mid 8s ease-in-out infinite;
    }

    .v13-edge {
      filter: blur(2.5px);
      animation: v13-edge 8s ease-in-out infinite;
    }

    .v13-exit {
      animation: v13-exit 8s ease-in-out infinite;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ========== Navbar ========== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(4, 6, 14, 0.65);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
    }

    .nav-logo .mark {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .nav-logo .wordmark {
      height: 22px;
      opacity: 0.9;
    }

    /* ========== Main ========== */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 76px 16px 24px;
      width: 100%;
    }

    /* ========== Card ========== */
    .card {
      width: 100%;
      max-width: 440px;
      padding: 44px 44px 40px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(rgba(8, 12, 24, 0.72), rgba(8, 12, 24, 0.72)) padding-box,
        conic-gradient(from var(--ba),
          rgba(46, 79, 255, 0) 0%,
          rgba(46, 79, 255, .75) 15%,
          rgba(0, 181, 160, .75) 38%,
          rgba(46, 79, 255, .75) 62%,
          rgba(0, 181, 160, .55) 80%,
          rgba(46, 79, 255, 0) 100%) border-box;
      border: 1px solid transparent;
      backdrop-filter: blur(12px);
      border-radius: 16px;
      box-shadow: 0 32px 64px rgba(0, 0, 0, .55);
      animation: spin-border 9s linear infinite, cardIn .65s cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes spin-border {
      to {
        --ba: 360deg;
      }
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .card-header svg.logo-anim {
      width: 160px;
      height: auto;
      margin-bottom: 20px;
      display: block;
      margin-inline: auto;
    }

    .card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.025em;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 14px;
      color: var(--muted);
    }

    /* ========== Form ========== */
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap .material-symbols-outlined {
      position: absolute;
      left: 14px;
      font-size: 20px;
      color: #444656;
      pointer-events: none;
      z-index: 1;
    }

    .input-wrap input {
      width: 100%;
      height: 46px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 10px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 0 14px 0 42px;
      outline: none;
      caret-color: rgba(255, 255, 255, 0.8);
      transition: border-color .15s, box-shadow .15s;
    }

    .input-wrap input::placeholder {
      color: #9BA0B0;
    }

    .input-wrap input:hover:not(:focus) {
      border-color: rgba(46, 79, 255, .3);
    }

    .input-wrap input:focus {
      border-color: rgba(46, 79, 255, .75);
      box-shadow: 0 0 0 3px rgba(46, 79, 255, .14);
    }

    .input-wrap input.error {
      border-color: #FF4D4D !important;
      box-shadow: 0 0 0 2px rgba(255, 77, 77, 0.2) !important;
    }

    .alert {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(255, 78, 106, 0.08);
      border: 1px solid rgba(255, 78, 106, 0.15);
      font-size: 12px;
      font-weight: 500;
      color: #ff4e6a;
      letter-spacing: 0.02em;
      animation: fadeInSubtle .3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .alert.show {
      display: flex;
    }

    .alert .material-symbols-outlined {
      font-size: 18px;
    }

    @keyframes fadeInSubtle {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== Button ========== */
    .btn {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--teal) 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
      transition: box-shadow .2s, transform .15s;
    }

    .btn:hover {
      box-shadow: 0 0 28px rgba(46, 79, 255, .4);
    }

    .btn:active {
      transform: scale(.985);
    }

    .btn:disabled {
      opacity: .6;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .btn.loading .btn-text {
      display: none;
    }

    .btn.loading .material-symbols-outlined {
      display: none;
    }

    .btn.loading .spinner {
      display: block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ========== Footer ========== */
    .footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.25);
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.05em;
    }

    /* ========== Responsive ========== */
    @media (max-width: 600px) {
      .card {
        padding: 32px 16px 28px;
        max-width: calc(100vw - 32px);
      }

      .card-title {
        font-size: 24px;
      }

      .card-header svg.logo-anim {
        width: 120px;
      }

      .navbar {
        padding: 0 16px;
      }
    }
  </style>
</head>

  <script>
    const form = document.getElementById('loginForm');
    const alert = document.getElementById('alert');
    const alertMsg = document.getElementById('alertMsg');
    const btn = document.getElementById('loginBtn');
    const username = document.getElementById('username');
    const password = document.getElementById('password');

    function showError(msg) {
      alertMsg.textContent = msg;
      alert.classList.add('show');
    }
    function hideError() {
      alert.classList.remove('show');
    }
    function markError(el) {
      el.classList.add('error');
      el.addEventListener('input', () => el.classList.remove('error'), { once: true });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      if (!username.value.trim()) { showError('Informe seu e-mail.'); markError(username); return; }
      if (!password.value) { showError('Informe sua senha.'); markError(password); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username.value.trim(), password: password.value }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error || 'Erro ao autenticar.');
          markError(username); markError(password);
        } else {
          window.location.href = '/hub';
        }
      } catch {
        showError('Erro de conexão. Tente novamente.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
