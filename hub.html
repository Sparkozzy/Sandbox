<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub — MindFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #2E4FFF;
      --teal: #00B5A0;
      --blue2: #7B9AFF;
      --bg: #04060E;
      --muted: #8E8FA2;
      --error: #FF4D4D;
      --motion-open-dur: 480ms;
      --motion-open-ease: cubic-bezier(0.32, 0.72, 0, 1);
    }

    @property --ba {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    /* ── Neural canvas ── */
    #neural-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ============================================================
       NAVBAR
    ============================================================ */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      background: rgba(4, 6, 14, 0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
    }

    .nav-left svg.mark {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .nav-left .brand {
      height: 22px;
      opacity: 0.92;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-user {
      font-size: 13px;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
    }

    .nav-user strong {
      color: #fff;
      font-weight: 500;
    }

    .btn-logout {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      transition: background .2s, color .2s, border-color .2s, box-shadow .2s;
    }

    .btn-logout:hover {
      background: rgba(255, 77, 77, 0.08);
      border-color: rgba(255, 77, 77, 0.25);
      color: var(--error);
      box-shadow: 0 0 20px rgba(255, 77, 77, 0.08);
    }

    .btn-logout .material-symbols-outlined {
      font-size: 16px;
    }

    /* ============================================================
       MAIN / HERO SECTION
    ============================================================ */
    main {
      position: relative;
      z-index: 1;
      flex: 1;
      padding: 96px 40px 48px;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
    }

    .hub-header {
      margin-bottom: 44px;
      animation: fadeSlideIn .7s var(--motion-open-ease) both;
    }

    .hub-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, var(--blue2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .hub-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    .hub-sub .accent {
      color: var(--teal);
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============================================================
       GRID
    ============================================================ */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    /* ============================================================
       PLATFORM CARD — Glassmorphism + Conic Border on Hover
    ============================================================ */
    .plat-card {
      --ba: 0deg;
      --accent: #2E4FFF;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 18px;
      padding: 36px 28px;
      background:
        linear-gradient(rgba(8, 12, 24, 0.82), rgba(6, 10, 20, 0.82)) padding-box,
        linear-gradient(rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03)) border-box;
      border: 1px solid transparent;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 18px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .45s cubic-bezier(0.34, 1.56, 0.64, 1),
        box-shadow .5s ease,
        border-color .4s ease;
      animation: cardIn .6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    /* Staggered entrance */
    .plat-card:nth-child(1) {
      animation-delay: 0.05s;
    }

    .plat-card:nth-child(2) {
      animation-delay: 0.10s;
    }

    .plat-card:nth-child(3) {
      animation-delay: 0.15s;
    }

    .plat-card:nth-child(4) {
      animation-delay: 0.22s;
    }

    .plat-card:nth-child(5) {
      animation-delay: 0.27s;
    }

    .plat-card:nth-child(6) {
      animation-delay: 0.32s;
    }

    .plat-card:nth-child(7) {
      animation-delay: 0.39s;
    }

    .plat-card:nth-child(8) {
      animation-delay: 0.44s;
    }

    .plat-card:nth-child(9) {
      animation-delay: 0.49s;
    }

    .plat-card:nth-child(10) {
      animation-delay: 0.54s;
    }

    /* ── Shimmer sweep pseudo ── */
    .plat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -120%;
      width: 80%;
      height: 100%;
      background: linear-gradient(105deg,
          transparent 0%,
          rgba(255, 255, 255, 0.02) 35%,
          rgba(255, 255, 255, 0.06) 48%,
          rgba(255, 255, 255, 0.02) 62%,
          transparent 100%);
      transform: skewX(-15deg);
      opacity: 0;
      transition: opacity .5s;
      pointer-events: none;
      z-index: 2;
    }

    .plat-card:hover::before {
      opacity: 1;
      animation: shimmer-sweep 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    /* ── Glow ring pseudo ── */
    .plat-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 18px;
      padding: 1px;
      background: conic-gradient(from var(--ba),
          transparent 0%,
          var(--accent) 18%,
          color-mix(in srgb, var(--accent), #fff 30%) 40%,
          var(--accent) 65%,
          color-mix(in srgb, var(--accent), #000 40%) 82%,
          transparent 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity .4s ease;
      pointer-events: none;
      z-index: 1;
    }

    .plat-card:hover::after {
      opacity: 1;
      animation: spin-border 4s linear infinite;
    }

    .plat-card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow:
        0 0 48px rgba(46, 79, 255, 0.08),
        0 24px 56px rgba(0, 0, 0, 0.5);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.94);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes spin-border {
      to {
        --ba: 360deg;
      }
    }

    @keyframes shimmer-sweep {
      0% {
        left: -100%;
      }

      50% {
        left: 200%;
      }

      100% {
        left: 200%;
      }
    }

    /* ── Icon container ── */
    .plat-icon {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: linear-gradient(135deg,
          color-mix(in srgb, var(--accent) 15%, transparent),
          color-mix(in srgb, var(--accent) 6%, transparent));
      border: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
      position: relative;
      z-index: 3;
      transition: background .35s, border-color .35s, box-shadow .35s;
    }

    .plat-card:hover .plat-icon {
      background: linear-gradient(135deg,
          color-mix(in srgb, var(--accent) 28%, transparent),
          color-mix(in srgb, var(--accent) 14%, transparent));
      border-color: color-mix(in srgb, var(--accent) 35%, transparent);
      box-shadow:
        0 0 28px color-mix(in srgb, var(--accent) 25%, transparent),
        0 0 56px color-mix(in srgb, var(--accent) 10%, transparent);
    }

    .plat-icon .material-symbols-outlined {
      font-size: 28px;
      background: linear-gradient(135deg,
          color-mix(in srgb, var(--accent) 90%, #fff),
          color-mix(in srgb, var(--accent) 70%, #00B5A0));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .plat-card:hover .plat-icon .material-symbols-outlined {
      background: linear-gradient(135deg, #fff, color-mix(in srgb, var(--accent) 60%, #fff));
      -webkit-background-clip: text;
      background-clip: text;
    }

    /* ── Text ── */
    .plat-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 3;
      transition: color .3s;
      color: rgba(255, 255, 255, 0.8);
    }

    .plat-card:hover .plat-name {
      color: #fff;
    }

    .plat-desc {
      font-size: 12.5px;
      color: rgba(142, 143, 162, 0.7);
      line-height: 1.6;
      position: relative;
      z-index: 3;
      transition: color .3s;
    }

    .plat-card:hover .plat-desc {
      color: rgba(255, 255, 255, 0.6);
    }

    /* ── Arrow indicator ── */
    .plat-arrow {
      position: absolute;
      top: 28px;
      right: 28px;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.06);
      transition: all .35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 3;
    }

    .plat-card:hover .plat-arrow {
      color: color-mix(in srgb, var(--accent) 80%, #fff);
      transform: translate(4px, -4px);
    }

    /* ============================================================
       FOOTER
    ============================================================ */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 20px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.18);
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.06em;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 960px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      main {
        padding: 88px 24px 32px;
      }
    }

    @media (max-width: 580px) {
      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .navbar {
        padding: 0 16px;
      }

      .nav-left .brand {
        display: none;
      }

      main {
        padding: 76px 14px 24px;
      }

      .hub-title {
        font-size: 24px;
      }

      .plat-card {
        padding: 24px 22px;
      }
    }
  </style>
</head>

    <div class="hub-header">
      <h1 class="hub-title">Plataformas</h1>

    </div>

  <!-- ── App Logic ── -->
  <script>
    const grid = document.getElementById('grid');
    const userName = document.getElementById('userName');
    const btnLogout = document.getElementById('btnLogout');

    async function checkSession() {
      try {
        const res = await fetch('/api/check');
        if (!res.ok) throw new Error('unauthorized');
        const data = await res.json();
        userName.textContent = data.name;
        loadPlatforms();
      } catch { window.location.href = '/'; }
    }

    async function loadPlatforms() {
      try {
        const res = await fetch('/api/platforms');
        const platforms = await res.json();
        renderCards(platforms);
      } catch {
        grid.innerHTML = '<p style="color:var(--muted);grid-column:1/-1;">Erro ao carregar plataformas.</p>';
      }
    }

    const PLATFORM_COLORS = {
      supabase: '#3ECF8E',
      n8n: '#FF6B6B',
      hostinger: '#8B5CF6',
      easypanel: '#06B6D4',
      mlflow: '#F59E0B',
      github: '#94A3B8',
      zapi: '#25D366',
      'trello-pi': '#2E4FFF',
      'trello-pe': '#00B5A0',
      retell: '#6366F1',
      formulario: '#F43F5E',
    };

    function renderCards(platforms) {
      grid.innerHTML = platforms.map(p => {
        const color = PLATFORM_COLORS[p.id] || '#2E4FFF';
        return `
        <a class="plat-card" href="${esc(p.url)}" target="_blank" rel="noopener noreferrer" title="${esc(p.name)} — ${esc(p.description)}" style="--accent: ${color}">
          <span class="material-symbols-outlined plat-arrow">north_east</span>
          <div class="plat-icon">
            <span class="material-symbols-outlined">${esc(p.icon)}</span>
          </div>
          <div class="plat-name">${esc(p.name)}</div>
          <div class="plat-desc">${esc(p.description)}</div>
        </a>
      `}).join('');

      // Tilt micro-interaction
      document.querySelectorAll('.plat-card').forEach(card => {
        card.addEventListener('mousemove', e => {
          const r = card.getBoundingClientRect();
          const x = (e.clientX - r.left) / r.width - 0.5;
          const y = (e.clientY - r.top) / r.height - 0.5;
          card.style.transform = `translateY(-6px) scale(1.03) perspective(600px) rotateY(${x * 5}deg) rotateX(${-y * 5}deg)`;
        });
        card.addEventListener('mouseleave', () => {
          card.style.transform = '';
        });
      });
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    btnLogout.addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/';
    });

    checkSession();
  </script>

  <!-- ── Neural Dot Grid ── -->
  <script>
    (function () {
      const cv = document.getElementById('neural-canvas');
      const ctx = cv.getContext('2d');
      let W, H, t = 0, dots = [], mouse = { x: -9999, y: -9999 };
      const PS = 0.75, BLUE = [46, 79, 255], TEAL = [0, 181, 160], GAP = 38;

      function rgba(rgb, a) { return `rgba(${rgb[0]},${rgb[1]},${rgb[2]},${a.toFixed(3)})`; }

      function resize() {
        const rW = window.innerWidth, rH = window.innerHeight;
        W = Math.min(rW, 2560); H = Math.min(rH, 1440);
        cv.width = rW * PS; cv.height = rH * PS;
        buildGrid();
      }

      function buildGrid() {
        dots = [];
        const cols = Math.ceil(W / GAP) + 2, rows = Math.ceil(H / GAP) + 2;
        for (let r = 0; r < rows; r++)
          for (let c = 0; c < cols; c++)
            dots.push({
              bx: c * GAP - GAP, by: r * GAP - GAP,
              phase: (c * .35 + r * .55) + Math.random() * .4,
              colorPhase: Math.random() * Math.PI * 2
            });
      }

      function waveAt(wx, wy, dx, dy) {
        const d = Math.sqrt(dx * dx + dy * dy);
        return Math.sin(d * .022 - t * .045 + wx * .01 + wy * .01) * Math.exp(-d / (Math.min(W, H) * .55));
      }

      function frame() {
        const rW = window.innerWidth, rH = window.innerHeight;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.fillStyle = '#04060E';
        ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.scale((rW / W) * PS, (rH / H) * PS);

        dots.forEach(d => {
          let inf = 0;
          [{ nx: .18, ny: .72, s: .00018, o: 0 }, { nx: .82, ny: .28, s: .00014, o: 2.1 }, { nx: .5, ny: .15, s: .0002, o: 4.2 }].forEach(wv => {
            const wx = (wv.nx + Math.sin(t * wv.s + wv.o) * .18) * W;
            const wy = (.5 + Math.cos(t * wv.s + wv.o) * .22) * H;
            inf += waveAt(wx, wy, d.bx - wx, d.by - wy);
          });
          inf /= 3;

          const x = d.bx + Math.sin(d.phase + t * .018) * 3.5 * inf * 4;
          const y = d.by + Math.cos(d.phase + t * .014) * 3.5 * inf * 4;
          const r = .9 + inf * 2.2;
          if (r <= 0) return;

          const mix = Math.sin(d.colorPhase + t * .008 + inf * 3) * .5 + .5;
          const rgb = [
            Math.round(BLUE[0] + (TEAL[0] - BLUE[0]) * mix),
            Math.round(BLUE[1] + (TEAL[1] - BLUE[1]) * mix),
            Math.round(BLUE[2] + (TEAL[2] - BLUE[2]) * mix)
          ];
          const mdx = d.bx - (mouse.x * (W / rW));
          const mdy = d.by - (mouse.y * (H / rH));
          const mGlow = Math.max(0, 1 - Math.sqrt(mdx * mdx + mdy * mdy) / 140);
          const br = .06 + Math.max(0, inf) * .55 + mGlow * .6;

          const g = ctx.createRadialGradient(x, y, 0, x, y, r * 5);
          g.addColorStop(0, rgba(rgb, br * .5));
          g.addColorStop(.4, rgba(rgb, br * .12));
          g.addColorStop(1, rgba(rgb, 0));
          ctx.beginPath(); ctx.arc(x, y, r * 5, 0, Math.PI * 2);
          ctx.fillStyle = g; ctx.fill();

          ctx.beginPath(); ctx.arc(x, y, Math.max(.3, r), 0, Math.PI * 2);
          ctx.fillStyle = rgba(rgb, .18 + Math.max(0, inf) * .65 + mGlow * .8);
          ctx.fill();
        });

        t++;
        requestAnimationFrame(frame);
      }

      resize();
      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
      window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
      frame();
    })();
  </script>
